name: Generate Stats Cards
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=AyushBaware&show_icons=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=AyushBaware&layout=compact&theme=tokyonight&hide_border=true&langs_count=8&hide=html,css
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: AyushBaware
          outputs: profile/snake.svg
      - name: Generate trophies
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: AyushBaware
          output_path: profile/trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit all generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "chore: update stats cards and snake" || echo "nothing to commit"
          git pull --rebase origin main
          git push
